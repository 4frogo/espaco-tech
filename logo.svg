<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
  </defs>

  <!-- Icon: abstract orbit/atomo -->
  <g transform="translate(40, 40)">
    <!-- Outer orbit -->
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="url(#g1)" stroke-width="2" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="url(#g1)" stroke-width="1.2" transform="rotate(25)" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="#FFB347" stroke-width="0.8" transform="rotate(75)" opacity="0.3"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="url(#g1)"/>
    <circle cx="0" cy="0" r="2" fill="#0B0E14"/>

    <!-- Orbiting particle -->
    <circle cx="0" cy="0" r="2.5" fill="#FFB347">
      <animateMotion dur="3s" repeatCount="indefinite" path="M-28,0 A28,10 0 1,1 28,0 A28,10 0 1,1 -28,0" rotate="auto"/>
    </circle>
    <circle cx="0" cy="0" r="2" fill="#FF6B35">
      <animateMotion dur="4s" repeatCount="indefinite" path="M0,-10 A28,10 0 0,0 0,10 A28,10 0 0,0 0,-10" rotate="auto"/>
    </circle>
  </g>

  <!-- Texto principal -->
  <text x="90" y="42" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="url(#g1)" letter-spacing="4">ESPAÇO</text>

  <!-- Linha decorativa -->
  <line x1="90" y1="52" x2="240" y2="52" stroke="url(#g1)" stroke-width="2" opacity="0.3"/>

  <!-- Subtexto -->
  <text x="90" y="70" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="300" fill="#FFFFFF" letter-spacing="8" opacity="0.6">TECH</text>
</svg>
