<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis Snake 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}
#game-container{position:relative;width:100vw;height:100vh}
canvas{display:block}

#hud{
  position:absolute;top:24px;left:24px;
  color:#fff;font-size:20px;font-weight:300;
  text-shadow:0 0 20px rgba(0,255,150,0.5);
  pointer-events:none;z-index:10;
  font-family:'Courier New',monospace;
}
#hud .score{font-size:48px;font-weight:700;letter-spacing:2px}
#hud .label{font-size:14px;opacity:0.6;text-transform:uppercase;letter-spacing:3px}

#game-over{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(0,0,0,0.3),rgba(0,0,0,0.85));
  z-index:20;color:#fff;
}
#game-over.visible{display:flex}
#game-over h1{font-size:64px;font-weight:700;text-shadow:0 0 40px rgba(255,68,170,0.6);margin-bottom:8px}
#game-over .final-score{font-size:28px;opacity:0.7;margin-bottom:32px}
#game-over .restart-btn{
  padding:16px 48px;font-size:20px;border:2px solid rgba(255,255,255,0.3);
  border-radius:50px;background:transparent;color:#fff;cursor:pointer;
  transition:all 0.3s;letter-spacing:2px;text-transform:uppercase;
}
#game-over .restart-btn:hover{
  background:rgba(255,255,255,0.1);border-color:rgba(0,255,150,0.6);
  box-shadow:0 0 30px rgba(0,255,150,0.2);
}

#controls-hint{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.3);font-size:14px;z-index:10;
  letter-spacing:2px;text-transform:uppercase;text-align:center;
  pointer-events:none;font-family:'Courier New',monospace;
}
#controls-hint span{display:inline-block;margin:0 6px;padding:4px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:4px}
</style>
</head>
<body>
<div id="game-container">
  <div id="hud">
    <div class="label">Pontuação</div>
    <div class="score" id="score-display">0</div>
  </div>
  <div id="game-over">
    <h1>GAME OVER</h1>
    <div class="final-score">Pontuação: <span id="final-score">0</span></div>
    <button class="restart-btn" id="restart-btn">Jogar Novamente</button>
  </div>
  <div id="controls-hint"><span>W A S D</span> ou <span>&uarr; &larr; &darr; &rarr;</span> para mover</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three'
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js'
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js'
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js'

const ISLAND_RADIUS = 20
const PLAY_RADIUS = 18
const SNAKE_SPEED = 7
const SEGMENT_SPACING = 10

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false })
renderer.setSize(window.innerWidth, window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.2
document.getElementById('game-container').prepend(renderer.domElement)

const scene = new THREE.Scene()
scene.fog = new THREE.FogExp2(0x0a0015, 0.006)

const bgCanvas = document.createElement('canvas')
bgCanvas.width = 2; bgCanvas.height = 512
const bgCtx = bgCanvas.getContext('2d')
const grad = bgCtx.createLinearGradient(0, 0, 0, 512)
grad.addColorStop(0, '#05000a'); grad.addColorStop(0.3, '#0a0018')
grad.addColorStop(0.6, '#0d0a2e'); grad.addColorStop(0.85, '#1a0a2e')
grad.addColorStop(1, '#0d0a1a')
bgCtx.fillStyle = grad; bgCtx.fillRect(0, 0, 2, 512)
scene.background = new THREE.CanvasTexture(bgCanvas)

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500)
camera.position.set(15, 22, 15)
camera.lookAt(0, 0, 0)

const composer = new EffectComposer(renderer)
const renderPass = new RenderPass(scene, camera)
composer.addPass(renderPass)
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.3, 0.2, 0.1
)
composer.addPass(bloomPass)

const ambientLight = new THREE.AmbientLight(0x222244, 0.5)
scene.add(ambientLight)
const moonLight = new THREE.DirectionalLight(0xffeedd, 1.8)
moonLight.position.set(-20, 30, 10)
moonLight.castShadow = true
moonLight.shadow.mapSize.width = 1024
moonLight.shadow.mapSize.height = 1024
moonLight.shadow.camera.near = 0.5
moonLight.shadow.camera.far = 80
moonLight.shadow.camera.left = -30
moonLight.shadow.camera.right = 30
moonLight.shadow.camera.top = 30
moonLight.shadow.camera.bottom = -30
scene.add(moonLight)
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4)
fillLight.position.set(10, 20, -15)
scene.add(fillLight)

const starCount = 4000
const starPos = new Float32Array(starCount * 3)
const starCol = new Float32Array(starCount * 3)
const starSiz = new Float32Array(starCount)
for (let i = 0; i < starCount; i++) {
  const r = 80 + Math.random() * 250
  const theta = Math.random() * Math.PI * 2
  const phi = Math.acos(2 * Math.random() - 1)
  starPos[i*3] = r * Math.sin(phi) * Math.cos(theta)
  starPos[i*3+1] = Math.abs(r * Math.cos(phi))
  starPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta)
  const c = new THREE.Color().setHSL(0.65 + Math.random() * 0.2, 0.3, 0.6 + Math.random() * 0.4)
  starCol[i*3] = c.r; starCol[i*3+1] = c.g; starCol[i*3+2] = c.b
  starSiz[i] = 0.3 + Math.random() * 1.5
}
const starGeo = new THREE.BufferGeometry()
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3))
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3))
starGeo.setAttribute('size', new THREE.BufferAttribute(starSiz, 1))
const starMat = new THREE.PointsMaterial({
  size: 0.8, vertexColors: true, transparent: true, opacity: 0.9,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false
})
scene.add(new THREE.Points(starGeo, starMat))

const islandGeo = new THREE.CylinderGeometry(ISLAND_RADIUS, ISLAND_RADIUS * 1.1, 2, 64)
const islandMat = new THREE.MeshStandardMaterial({
  color: 0xc4956a, roughness: 0.9, metalness: 0.0,
})
const island = new THREE.Mesh(islandGeo, islandMat)
island.position.y = -1
island.receiveShadow = true
island.castShadow = true
scene.add(island)

const sandGeo = new THREE.CircleGeometry(ISLAND_RADIUS - 0.5, 64)
const sandMat = new THREE.MeshStandardMaterial({
  color: 0xd4a76a, roughness: 0.95, metalness: 0.0, side: THREE.DoubleSide
})
const sand = new THREE.Mesh(sandGeo, sandMat)
sand.rotation.x = -Math.PI / 2
sand.position.y = 0.05
sand.receiveShadow = true
scene.add(sand)

const waterGeo = new THREE.CircleGeometry(7, 32)
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x40e0d0, transparent: true, opacity: 0.65,
  roughness: 0.05, metalness: 0.2, clearcoat: 0.5, clearcoatRoughness: 0.3,
  side: THREE.DoubleSide, envMapIntensity: 0.4,
})
const water = new THREE.Mesh(waterGeo, waterMat)
water.rotation.x = -Math.PI / 2
water.position.y = 0.06
scene.add(water)

const ringGeo = new THREE.RingGeometry(6.8, 7.5, 48)
const ringMat = new THREE.MeshStandardMaterial({
  color: 0x8a7a5a, roughness: 0.9, metalness: 0.0, side: THREE.DoubleSide, transparent: true, opacity: 0.6
})
const ring = new THREE.Mesh(ringGeo, ringMat)
ring.rotation.x = -Math.PI / 2
ring.position.y = 0.04
scene.add(ring)

function createPalmTree(x, z) {
  const g = new THREE.Group()
  const tMat = new THREE.MeshStandardMaterial({ color: 0x7a4a2a, roughness: 0.9 })
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.22, 2.2, 8), tMat)
  trunk.position.y = 1.1; g.add(trunk)
  const fMat = new THREE.MeshStandardMaterial({ color: 0x2a5a27, roughness: 0.8 })
  for (let i = 0; i < 7; i++) {
    const fr = new THREE.Mesh(new THREE.SphereGeometry(0.45, 6, 6), fMat)
    const a = (i / 7) * Math.PI * 2
    fr.position.set(Math.cos(a) * 0.7, 2.3, Math.sin(a) * 0.7)
    fr.scale.set(1, 0.25, 1); g.add(fr)
  }
  const tMat2 = new THREE.MeshStandardMaterial({ color: 0x3a7a33, roughness: 0.8 })
  const top = new THREE.Mesh(new THREE.SphereGeometry(0.55, 6, 6), tMat2)
  top.position.y = 2.3; top.scale.set(1, 0.4, 1); g.add(top)
  const tilt = 0.05 + Math.random() * 0.08
  const ang = Math.random() * Math.PI * 2
  g.rotation.z = Math.cos(ang) * tilt
  g.rotation.x = Math.sin(ang) * tilt
  g.position.set(x, 0, z); scene.add(g); return g
}

function createRock(x, z) {
  const s = 0.25 + Math.random() * 0.5
  const geo = new THREE.DodecahedronGeometry(s, 0)
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(0.07, 0.15, 0.25 + Math.random() * 0.2),
    roughness: 0.95, metalness: 0.0
  })
  const m = new THREE.Mesh(geo, mat)
  m.position.set(x, s * 0.5, z)
  m.rotation.set(Math.random() * 6, Math.random() * 6, 0)
  m.castShadow = true; m.receiveShadow = true
  scene.add(m); return m
}

function createCrystal(x, z) {
  const h = 0.4 + Math.random() * 0.4
  const geo = new THREE.CylinderGeometry(0.05, 0.15, h, 6)
  const mat = new THREE.MeshStandardMaterial({
    color: 0x88ddff, emissive: 0x88ddff, emissiveIntensity: 0.3,
    transparent: true, opacity: 0.7, roughness: 0.1, metalness: 0.3
  })
  const m = new THREE.Mesh(geo, mat)
  m.position.set(x, h * 0.5, z)
  scene.add(m); return m
}

const treePositions = []
const treeAngles = [0, 1.2, 2.4, 3.6, 4.8, 5.0, 3.0, 1.8]
for (const a of treeAngles) {
  const r = 8 + Math.random() * 3
  treePositions.push({ x: Math.cos(a) * r, z: Math.sin(a) * r })
}
for (const p of treePositions) createPalmTree(p.x, p.z)

const obstacles = []
const obsPositions = new Set()
function posKey(x, z) { return `${Math.round(x*2)},${Math.round(z*2)}` }

for (let i = 0; i < 20; i++) {
  let x, z, key
  let attempts = 0
  do {
    const a = Math.random() * Math.PI * 2
    const r = 7.5 + Math.random() * (PLAY_RADIUS - 7.5)
    x = Math.cos(a) * r; z = Math.sin(a) * r
    key = posKey(x, z)
    attempts++
  } while ((obsPositions.has(key) || (Math.abs(x) < 7 && Math.abs(z) < 7)) && attempts < 50)
  obsPositions.add(key)
  const rock = createRock(x, z)
  obstacles.push(new THREE.Vector3(x, 0, z))
}

for (let i = 0; i < 8; i++) {
  const a = Math.random() * Math.PI * 2
  const r = 7.5 + Math.random() * 3
  const x = Math.cos(a) * r, z = Math.sin(a) * r
  const crystal = createCrystal(x, z)
}

const boundaryGlow = []
for (let i = 0; i < 32; i++) {
  const a = (i / 32) * Math.PI * 2
  const r = PLAY_RADIUS + 0.3
  const x = Math.cos(a) * r, z = Math.sin(a) * r
  const geo = new THREE.CylinderGeometry(0.06, 0.12, 0.4, 6)
  const mat = new THREE.MeshStandardMaterial({
    color: 0x44aaff, emissive: 0x44aaff, emissiveIntensity: 0.4,
    transparent: true, opacity: 0.5
  })
  const m = new THREE.Mesh(geo, mat)
  m.position.set(x, 0.2, z)
  scene.add(m)
  boundaryGlow.push(m)
}

const fireflyGeo = new THREE.BufferGeometry()
const ffCount = 100
const ffPos = new Float32Array(ffCount * 3)
const ffVel = new Float32Array(ffCount * 3)
for (let i = 0; i < ffCount; i++) {
  const a = Math.random() * Math.PI * 2
  const r = Math.random() * 15
  ffPos[i*3] = Math.cos(a) * r
  ffPos[i*3+1] = 0.5 + Math.random() * 2
  ffPos[i*3+2] = Math.sin(a) * r
  ffVel[i*3] = (Math.random() - 0.5) * 0.3
  ffVel[i*3+1] = (Math.random() - 0.5) * 0.15
  ffVel[i*3+2] = (Math.random() - 0.5) * 0.3
}
fireflyGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3))
const ffMat = new THREE.PointsMaterial({
  color: 0xffdd88, size: 0.15, transparent: true, opacity: 0.6,
  blending: THREE.AdditiveBlending, sizeAttenuation: true, depthWrite: false
})
const fireflies = new THREE.Points(fireflyGeo, ffMat)
scene.add(fireflies)

const snakeSegments = []
const snakePath = []
let snakeDir = new THREE.Vector3(1, 0, 0)
let nextDir = new THREE.Vector3(1, 0, 0)
let segmentCount = 3
let snakeHeadPos = new THREE.Vector3(0, 0, -10)
let isAlive = true
let score = 0
let snakeConnectors = []

function createSegment(index, total, pos) {
  const isHead = index === 0
  const isTail = index === total - 1
  const hue = 0.30 + (index / Math.max(total - 1, 1)) * 0.25
  const sat = 0.9
  const light = isHead ? 0.6 : 0.5 - (index / Math.max(total - 1, 1)) * 0.15
  const emissiveIntensity = isHead ? 0.5 : 0.25

  const r = isHead ? 0.5 : isTail ? 0.25 : 0.32
  const geo = new THREE.SphereGeometry(r, 16, 16)
  const color = new THREE.Color().setHSL(hue, sat, light)
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity,
    roughness: 0.25, metalness: 0.2,
  })
  const m = new THREE.Mesh(geo, mat)
  m.position.copy(pos)
  m.castShadow = true
  scene.add(m)

  if (isHead) {
    const eyeGeo = new THREE.SphereGeometry(0.12, 8, 8)
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3 })
    const pupilGeo = new THREE.SphereGeometry(0.06, 8, 8)
    const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 })
    for (const side of [-1, 1]) {
      const eye = new THREE.Mesh(eyeGeo, eyeMat)
      eye.position.set(side * 0.3, 0.15, -0.4)
      m.add(eye)
      const pupil = new THREE.Mesh(pupilGeo, pupilMat)
      pupil.position.set(side * 0.3, 0.18, -0.5)
      m.add(pupil)
    }
  }

  return m
}

function createConnector(pos1, pos2) {
  const start = pos1.clone(); const end = pos2.clone()
  const mid = start.clone().add(end).multiplyScalar(0.5)
  const dir = end.clone().sub(start)
  const len = dir.length()
  if (len < 0.01) return null
  const geo = new THREE.CylinderGeometry(0.12, 0.15, len, 6)
  const mat = new THREE.MeshStandardMaterial({
    color: 0x88ffaa, emissive: 0x88ffaa, emissiveIntensity: 0.15,
    roughness: 0.3, metalness: 0.2,
  })
  const m = new THREE.Mesh(geo, mat)
  m.position.copy(mid)
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize())
  m.castShadow = true
  scene.add(m)
  return m
}

function updateConnectors() {
  for (const c of snakeConnectors) scene.remove(c)
  snakeConnectors.length = 0
  for (let i = 0; i < snakeSegments.length - 1; i++) {
    const conn = createConnector(snakeSegments[i].position, snakeSegments[i + 1].position)
    if (conn) snakeConnectors.push(conn)
  }
}

function initSnake() {
  while (snakeSegments.length > 0) {
    scene.remove(snakeSegments.pop())
  }
  for (const c of snakeConnectors) scene.remove(c)
  snakeConnectors.length = 0
  snakePath.length = 0
  snakeHeadPos.set(0, 0, -10)
  snakeDir.set(0, 0, 1)
  nextDir.set(0, 0, 1)
  segmentCount = 3
  for (let i = 0; i < segmentCount; i++) {
    const pos = snakeHeadPos.clone().add(new THREE.Vector3(0, 0, -i * 0.8))
    const seg = createSegment(i, segmentCount, pos)
    snakeSegments.push(seg)
    for (let j = 0; j < SEGMENT_SPACING; j++) {
      snakePath.push(pos.clone())
    }
  }
  updateConnectors()
}

let food = null
let foodGlow = null
let foodLight = null

function spawnFood() {
  if (food) { scene.remove(food); scene.remove(foodGlow); scene.remove(foodLight) }
  let x, z, valid
  let tries = 0
  do {
    const a = Math.random() * Math.PI * 2
    const r = 7.5 + Math.random() * (PLAY_RADIUS - 7.5)
    x = Math.cos(a) * r; z = Math.sin(a) * r
    valid = true
    for (const o of obstacles) {
      if (new THREE.Vector3(x, 0, z).distanceTo(o) < 1.2) { valid = false; break }
    }
    if (snakeHeadPos.distanceTo(new THREE.Vector3(x, 0, z)) < 3) valid = false
    tries++
  } while (!valid && tries < 50)

  const geo = new THREE.OctahedronGeometry(0.5)
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff44aa, emissive: 0xff44aa, emissiveIntensity: 0.8,
    roughness: 0.1, metalness: 0.4
  })
  food = new THREE.Mesh(geo, mat)
  food.position.set(x, 1.2, z)
  scene.add(food)

  const glowCanvas2 = document.createElement('canvas')
  glowCanvas2.width = 64; glowCanvas2.height = 64
  const g2 = glowCanvas2.getContext('2d')
  const grad2 = g2.createRadialGradient(32, 32, 0, 32, 32, 32)
  grad2.addColorStop(0, 'rgba(255,68,170,0.8)'); grad2.addColorStop(0.3, 'rgba(255,68,170,0.3)')
  grad2.addColorStop(1, 'rgba(255,68,170,0)')
  g2.fillStyle = grad2; g2.fillRect(0, 0, 64, 64)
  const glowTex = new THREE.CanvasTexture(glowCanvas2)
  const glowMat2 = new THREE.SpriteMaterial({ map: glowTex, blending: THREE.AdditiveBlending, transparent: true })
  foodGlow = new THREE.Sprite(glowMat2)
  foodGlow.scale.set(4, 4, 1)
  foodGlow.position.set(x, 1.2, z)
  scene.add(foodGlow)

  foodLight = new THREE.PointLight(0xff44aa, 1, 8)
  foodLight.position.set(x, 1.5, z)
  scene.add(foodLight)
}

function updateSnake(delta) {
  if (!isAlive) return

  snakeDir.copy(nextDir)
  const move = snakeDir.clone().multiplyScalar(SNAKE_SPEED * delta)
  snakeHeadPos.add(move)

  const dist = Math.sqrt(snakeHeadPos.x * snakeHeadPos.x + snakeHeadPos.z * snakeHeadPos.z)
  if (dist > PLAY_RADIUS) {
    die(); return
  }

  snakePath.push(snakeHeadPos.clone())
  const maxPath = (segmentCount + 5) * SEGMENT_SPACING
  while (snakePath.length > maxPath) snakePath.shift()

  for (let i = 0; i < segmentCount; i++) {
    const idx = Math.max(0, snakePath.length - 1 - i * SEGMENT_SPACING)
    const pos = snakePath[Math.min(Math.floor(idx), snakePath.length - 1)]
    snakeSegments[i].position.copy(pos)
  }
  snakeSegments[0].position.copy(snakeHeadPos)
  for (let i = 0; i < segmentCount; i++) {
    snakeSegments[i].position.y += Math.sin(time * 3 + i * 0.8) * 0.04
  }
  updateConnectors()

  for (const o of obstacles) {
    const dx = snakeHeadPos.x - o.x
    const dz = snakeHeadPos.z - o.z
    if (dx * dx + dz * dz < 1.44) { die(); return }
  }

  for (let i = 5; i < segmentCount; i++) {
    const dx = snakeHeadPos.x - snakeSegments[i].position.x
    const dz = snakeHeadPos.z - snakeSegments[i].position.z
    if (dx * dx + dz * dz < 0.16) { die(); return }
  }

  if (food) {
    const dx = snakeHeadPos.x - food.position.x
    const dz = snakeHeadPos.z - food.position.z
    if (dx * dx + dz * dz < 1.0) eat()
  }
}

function eat() {
  score += 10
  document.getElementById('score-display').textContent = score
  segmentCount++
  const lastPos = snakeSegments[snakeSegments.length - 1].position.clone()
  const seg = createSegment(segmentCount - 1, segmentCount, lastPos)
  snakeSegments.push(seg)
  spawnFood()
}

function die() {
  if (!isAlive) return
  isAlive = false
  for (const s of snakeSegments) {
    s.material.emissive.setHex(0xff0000)
    s.material.color.setHex(0xff4444)
  }
  document.getElementById('final-score').textContent = score
  document.getElementById('game-over').classList.add('visible')
}

const keyStack = []
const DIR_MAP = {
  w: new THREE.Vector3(0, 0, -1),
  s: new THREE.Vector3(0, 0, 1),
  a: new THREE.Vector3(-1, 0, 0),
  d: new THREE.Vector3(1, 0, 0),
}

document.addEventListener('keydown', (e) => {
  if (DIR_MAP[e.key]) {
    const idx = keyStack.indexOf(e.key)
    if (idx >= 0) keyStack.splice(idx, 1)
    keyStack.push(e.key)
    e.preventDefault()
  }
  if ((e.key === ' ' || e.key === 'Enter') && !isAlive) restart()
})

document.addEventListener('keyup', (e) => {
  const idx = keyStack.indexOf(e.key)
  if (idx >= 0) keyStack.splice(idx, 1)
})

document.getElementById('restart-btn').addEventListener('click', restart)

function restart() {
  document.getElementById('game-over').classList.remove('visible')
  for (const s of snakeSegments) scene.remove(s)
  snakeSegments.length = 0
  keyStack.length = 0
  if (food) { scene.remove(food); scene.remove(foodGlow); scene.remove(foodLight); food = null }
  score = 0
  document.getElementById('score-display').textContent = '0'
  isAlive = true
  initSnake()
  spawnFood()
}

function handleInput() {
  if (keyStack.length === 0) return
  const dir = DIR_MAP[keyStack[keyStack.length - 1]]
  if (dir && dir.dot(snakeDir) >= -0.1) {
    nextDir.copy(dir)
  }
}

let time = 0
let lastTime = 0

function animate(timestamp) {
  requestAnimationFrame(animate)
  const delta = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016
  lastTime = timestamp

  if (isAlive) {
    handleInput()
    updateSnake(delta)
    time += delta

    if (food) {
      food.rotation.x += delta * 2
      food.rotation.y += delta * 3
      food.position.y = 1.2 + Math.sin(time * 2) * 0.2
      foodGlow.position.copy(food.position)
      foodLight.position.copy(food.position)
      foodLight.position.y += 0.3
    }

    water.position.y = 0.06 + Math.sin(time * 0.8) * 0.03

    const targetCam = new THREE.Vector3(snakeHeadPos.x + 14, 20, snakeHeadPos.z + 12)
    camera.position.lerp(targetCam, 0.05)
    camera.lookAt(snakeHeadPos.x, 0.5, snakeHeadPos.z)
  }

  const ff = fireflies.geometry.attributes.position.array
  for (let i = 0; i < ffCount; i++) {
    ff[i*3] += ffVel[i*3] * delta
    ff[i*3+1] += ffVel[i*3+1] * delta + Math.sin(time + i) * 0.002
    ff[i*3+2] += ffVel[i*3+2] * delta
    const r = Math.sqrt(ff[i*3]*ff[i*3] + ff[i*3+2]*ff[i*3+2])
    if (r > PLAY_RADIUS) { ff[i*3] *= 0.99; ff[i*3+2] *= 0.99 }
    if (ff[i*3+1] < 0.2) ff[i*3+1] = 0.2
    if (ff[i*3+1] > 3) ff[i*3+1] = 3
  }
  fireflies.geometry.attributes.position.needsUpdate = true

  for (const b of boundaryGlow) {
    const pulse = 0.3 + Math.sin(time * 1.5 + b.position.x + b.position.z) * 0.2
    b.material.emissiveIntensity = pulse
    b.material.opacity = 0.3 + pulse * 0.5
  }

  composer.render()
}

initSnake()
spawnFood()
animate()

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight
  camera.aspect = w / h; camera.updateProjectionMatrix()
  renderer.setSize(w, h); composer.setSize(w, h)
})
</script>
</body>
